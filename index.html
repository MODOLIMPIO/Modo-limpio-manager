
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modo Limpio Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#198754;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
text-align:center;
}

.menu button{

width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#198754;
color:white;
font-size:18px;

}

.menu button:hover{

background:#146c43;
cursor:pointer;

}

footer{

margin-top:30px;
padding:20px;
text-align:center;
color:gray;

}

</style>

</head>

<body>

<header>

🧴 MODO LIMPIO MANAGER

</header>

<div class="container">

<h2>Panel Principal</h2>

<br>

<div class="cards">

<div class="card">

💰

<h3>Ventas del día</h3>

<h2>$0</h2>

</div>

<div class="card">

📦

<h3>Pedidos</h3>

<h2>0</h2>

</div>

<div class="card">

👥

<h3>Clientes</h3>

<h2>0</h2>

</div>

<div class="card">

📈

<h3>Ganancia</h3>

<h2>$0</h2>

</div>

</div>

<a href="#"><button>📈 Estadísticas</button></a>

<a href="#"><button>⚙️ Configuración</button></a>


</div>

</div>

<footer>

</footer>

</html>
