<title>Dashboard | Modo Limpio Manager</title>

<style>

padding:0;

}

body{

}

header{

background:#198754;
color:white;
padding:20px;

}

}

.card{

padding:20px;

margin-bottom:15px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));

}

.box{

background:#e8f7ef;

font-weight:bold;

}

button{

padding:15px;

color:white;
font-size:17px;

}

</style>

</head>
