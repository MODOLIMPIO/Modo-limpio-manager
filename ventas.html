<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nueva Venta | Modo Limpio Manager</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.contenedor{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#198754;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#198754;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

.total{
margin-top:20px;
padding:15px;
background:#e8f7ef;
border-radius:10px;
text-align:center;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🧾 Nueva Venta</h1>

<label>Cliente</label>

<input type="text" placeholder="Seleccionar cliente">

<label>Producto</label>

<input type="text" placeholder="Seleccionar producto">

<label>Cantidad</label>

<input type="number" placeholder="0">

<label>Precio</label>

<input type="number" placeholder="$0">

<div class="total">

TOTAL: $0

</div>

<button onclick="guardarVenta()">
Guardar Venta
</button>
  
</div>
</div>

<script>
function guardarVenta() {

  let cliente = document.querySelectorAll("input")[0].value;
  let producto = document.querySelectorAll("input")[1].value;
  let cantidad = document.querySelectorAll("input")[2].value;
  let precio = document.querySelectorAll("input")[3].value;

  let total = cantidad * precio;

  let ventas =
    JSON.parse(localStorage.getItem("ventas")) || [];

  ventas.push({
    cliente,
    producto,
    cantidad,
    precio,
    total
  });

  localStorage.setItem(
    "ventas",
    JSON.stringify(ventas)
  );

  alert("Venta guardada correctamente");
}
</script>

</body>

</html>
