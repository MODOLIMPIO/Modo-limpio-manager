<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos | Modo Limpio Manager</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

.contenedor{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#198754;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#198754;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>📦 Productos</h1>

<label>Nombre del producto</label>
<input type="text" placeholder="Ej: Jabón común">

<label>Categoría</label>
<select>
<option>Líquido</option>
<option>Seco</option>
</select>

<label>Precio de costo</label>
<input type="number" placeholder="$">

<label>Precio de venta</label>
<input type="number" placeholder="$">

<label>Stock</label>
<input type="number" placeholder="Cantidad">

<button>
Guardar Producto
</button>

</div>

</body>
</html>
