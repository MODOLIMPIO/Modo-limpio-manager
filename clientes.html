<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes - Modo Limpio Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

h1{
    color:#2c3e50;
}

form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.cliente{
    background:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>👥 Clientes</h1>

<form onsubmit="guardarCliente(); return false;">
    <input type="text" id="nombre" placeholder="Nombre del cliente" required>

    <input type="text" id="telefono" placeholder="Teléfono">

    <input type="text" id="direccion" placeholder="Dirección">

    <textarea id="observaciones" placeholder="Observaciones"></textarea>

    <button type="submit">Guardar Cliente</button>
</form>

<div id="listaClientes"></div>

<script>

function guardarCliente(){

    let nombre=document.getElementById("nombre").value;
    let telefono=document.getElementById("telefono").value;
    let direccion=document.getElementById("direccion").value;
    let observaciones=document.getElementById("observaciones").value;

    let clientes=
    JSON.parse(localStorage.getItem("clientes")) || [];

    clientes.push({
        nombre:nombre,
        telefono:telefono,
        direccion:direccion,
        observaciones:observaciones
    });

    localStorage.setItem(
        "clientes",
        JSON.stringify(clientes)
    );

    mostrarClientes();

    document.getElementById("nombre").value="";
    document.getElementById("telefono").value="";
    document.getElementById("direccion").value="";
    document.getElementById("observaciones").value="";
}

function mostrarClientes(){

    let clientes=
    JSON.parse(localStorage.getItem("clientes")) || [];

    let html="<h2>Clientes Guardados</h2>";

    clientes.forEach(c=>{

        html += `
        <div class="cliente">
            <strong>${c.nombre}</strong><br>
            📞 ${c.telefono}<br>
            📍 ${c.direccion}
        </div>
        `;

    });

    document.getElementById("listaClientes").innerHTML=html;
}

mostrarClientes();

</script>

</body>
</html>
