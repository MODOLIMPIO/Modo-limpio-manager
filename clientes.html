<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes | Modo Limpio Manager</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#198754;
}

.contenedor{

max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.2);

}

input,textarea{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;

}

button{

width:100%;
padding:15px;
background:#198754;
color:white;
border:none;
border-radius:8px;
font-size:18px;

}

button:hover{

background:#146c43;

}

</style>

</head>

<body>

<div class="contenedor">

<h1>👥 Clientes</h1>

<label>Nombre del cliente</label>

<input type="text" placeholder="Ej: Juan Pérez">

<label>Teléfono</label>

<input type="text" placeholder="Ej: 2604xxxxxx">

<label>Dirección</label>

<input type="text" placeholder="Ej: Calle, número y barrio">

<label>Observaciones</label>

<textarea rows="5" placeholder="Notas importantes del cliente"></textarea>
  
<button onclick="guardarCliente()">

Guardar Cliente

</button>

<div id="listaClientes" style="margin-top:20px;"></div>

</div>
<script>

function guardarCliente(){

let nombre = document.querySelectorAll("input")[0].value;
let telefono = document.querySelectorAll("input")[1].value;
let direccion = document.querySelectorAll("input")[2].value;

if(nombre==""){
alert("Ingrese un nombre");
return;
}

let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];

clientes.push({
nombre,
telefono,
direccion
});

localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);

mostrarClientes();

}

function mostrarClientes(){

let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];

let html="<h3>Clientes Guardados</h3>";

clientes.forEach(c=>{

html += `
<div style="
padding:10px;
margin-bottom:10px;
background:#f0f0f0;
border-radius:8px;
">
<strong>${c.nombre}</strong><br>
📞 ${c.telefono}<br>
📍 ${c.direccion}
</div>
`;

});

document.getElementById(
"listaClientes"
).innerHTML = html;

}
